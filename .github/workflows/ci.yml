# Fast feedback on every push/PR: Rust unit tests + a single-platform build +
# the pytest integration suite against real Postgres/ClickHouse containers.
# Full multi-platform wheel builds only happen in release.yml, on tags.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust unit tests
        run: cargo test -p etlhouse-core

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build the extension (debug, fast)
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --out dist -i python3.12
          manylinux: auto

      - name: Install etlhouse + test deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --find-links dist --no-index etlhouse
          pip install pytest 'psycopg[binary]>=3.1' 'clickhouse-connect>=0.7'

      - name: Start Postgres + ClickHouse
        run: docker compose up -d --wait

      - name: pytest
        run: |
          source .venv/bin/activate
          pytest -v
