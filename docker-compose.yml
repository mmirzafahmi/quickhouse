# Local services for the integration test suite.
#   docker compose up -d
#   pip install -e '.[test]' && maturin develop && pytest
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: etl
      POSTGRES_PASSWORD: etl
      POSTGRES_DB: etl
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl"]
      interval: 3s
      timeout: 3s
      retries: 20

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: etl
      MYSQL_USER: etl
      MYSQL_PASSWORD: etl
      MYSQL_DATABASE: etl
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uetl", "-petl"]
      interval: 3s
      timeout: 3s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      # Without this, the image auto-generates a random password for the
      # `default` user on first start, breaking the empty-password default
      # used by the test suite and README.
      CLICKHOUSE_SKIP_USER_SETUP: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # native
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  # S3-compatible store for the optional S3 data-lake archive
  # (ClickHouse(..., archive=S3Archive(...))) — fully local, no AWS account
  # needed. API on 9010 (mapped away from ClickHouse's native-protocol 9000),
  # web console on 9011.
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9010:9000"
      - "9011:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 20
